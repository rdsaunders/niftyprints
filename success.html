<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment received — thank you</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-head">
    <a class="wordmark" href="/">nifty prints<span class="wordmark__dot">.</span></a>
    <p class="tag">made to order</p>
  </header>

  <main>
    <article class="product">
      <section class="hero">
        <p class="eyebrow">order confirmed</p>
        <h1 class="hero__title">Payment<br />received.</h1>
        <p class="hero__lede">Thanks for your order. I'll email you shortly to arrange a pickup time. Your receipt is on its way from Stripe.</p>
        <p class="pickup"><a href="/">← Back to the shop</a></p>
      </section>
    </article>
  </main>

  <footer class="site-foot">
    <!-- Set up hello@niftyprints.co.uk (e.g. email forwarding at your registrar) once the domain is registered. -->
    <p>Questions? <a href="mailto:hello@niftyprints.co.uk">hello@niftyprints.co.uk</a></p>
  </footer>
</body>
</html>
